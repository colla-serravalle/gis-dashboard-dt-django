<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, minimum-scale=1">
    <link href="{% load static %}{% static 'css/login.css' %}" rel="stylesheet" type="text/css">
    <title>Login</title>
    <style>
        .azure-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 10px 16px;
            background: #0078d4;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            box-sizing: border-box;
            margin-bottom: 4px;
        }
        .azure-btn:hover {
            background: #006abe;
            color: #fff;
            text-decoration: none;
        }
        .login-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 16px 0 12px;
            color: #888;
            font-size: 13px;
        }
        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        .login-divider span {
            padding: 0 10px;
        }
        .admin-only-label {
            font-size: 12px;
            color: #999;
            text-align: center;
            font-style: italic;
            margin: 0 0 12px;
        }
    </style>
</head>
<body>
    <div class="login">
        <img id="logo-login" src="{% load static %}{% static 'img/logo-login.png' %}">
        <h1>Login DT Serravalle</h1>

        {% if error_message %}
        <div style="background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #f5c6cb;">
            {{ error_message }}
        </div>
        {% endif %}

        <a href="/oidc/authenticate/{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}"
           class="btn azure-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 23 23">
                <path fill="#f3f3f3" d="M0 0h23v23H0z"/>
                <path fill="#f35325" d="M1 1h10v10H1z"/>
                <path fill="#81bc06" d="M12 1h10v10H12z"/>
                <path fill="#05a6f0" d="M1 12h10v10H1z"/>
                <path fill="#ffba08" d="M12 12h10v10H12z"/>
            </svg>
            Accedi con Azure
        </a>

        <div class="login-divider">
            <span>oppure</span>
        </div>

        <p class="admin-only-label">Accesso riservato agli amministratori</p>

        <form action="{% url 'accounts:login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" method="post" class="form login-form">
            {% csrf_token %}

            <label class="form-label" for="username">Username</label>
            <div class="form-group">
                <svg class="form-icon-left" width="14" height="14" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm-45.7 48C79.8 304 0 383.8 0 482.3C0 498.7 13.3 512 29.7 512H418.3c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304H178.3z"/></svg>
                {{ form.username }}
            </div>

            <label class="form-label" for="password">Password</label>
            <div class="form-group mar-bot-5">
                <svg class="form-icon-left" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 448 512"><path d="M144 144v48H304V144c0-44.2-35.8-80-80-80s-80 35.8-80 80zM80 192V144C80 64.5 144.5 0 224 0s144 64.5 144 144v48h16c35.3 0 64 28.7 64 64V448c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V256c0-35.3 28.7-64 64-64H80z"/></svg>
                {{ form.password }}
            </div>

            <button class="btn blue" type="submit">Login</button>
        </form>
    </div>
</body>
</html>
