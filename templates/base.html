{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reports Serravalle{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
          integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
          crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Favicon -->
    <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <link rel="icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">

    <script type="text/javascript" src="{% static 'js/app.js' %}"
        {% if csp_nonce %}nonce="{{ csp_nonce }}"{% endif %} defer></script>
    {{ ui_strings|json_script:"page-ui-strings" }}
    <script {% if csp_nonce %}nonce="{{ csp_nonce }}"{% endif %}>
        window.UI_STRINGS = JSON.parse(document.getElementById('page-ui-strings').textContent);
    </script>
    {% block extra_css %}{% endblock %}
    {% block extra_head %}{% endblock %}
</head>

<body>
    <header id="mobile-header" class="mobile-only">
        <img id="mobile-logo" src="https://www.serravalle.it/assets/img/logo.png?id=1" alt="Logo">
    </header>
    <nav id="sidebar">
        {% include 'includes/sidebar.html' %}
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
